// ── Lemonade tracking view ─────────────────────────────────────────────────────
async function renderLemonadeView() {
  const main = document.getElementById('main');

  main.innerHTML = `
    <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
      <div class="page-title" style="font-family:var(--brand);font-size:22px;color:var(--red)">Killer Lemonade</div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <div class="section-title" style="margin-bottom:12px">Live i dag</div>
      <div id="lemonade-today-wrap">
        <div class="spinner-wrap"><div class="spinner"></div> Henter data…</div>
      </div>
    </div>

    <div class="card">
      <div class="section-title" style="margin-bottom:12px">Historik</div>
      <div id="lemonade-history-wrap">
        <div class="spinner-wrap"><div class="spinner"></div> Henter historik…</div>
      </div>
    </div>`;

  async function loadToday() {
    const wrap = document.getElementById('lemonade-today-wrap');
    if (!wrap) return;
    try {
      const r = await fetch('/api/lemonade/today');
      const d = await r.json();
      let html = '<div class="kpi-grid">';
      for (const s of STORES) {
        const cnt = (d.stores && d.stores[s.id] != null) ? d.stores[s.id] : '—';
        html += `<div class="kpi-card"><div class="kpi-label">${s.name}</div><div class="kpi-value">${cnt}</div></div>`;
      }
      html += `<div class="kpi-card" style="border-color:var(--red)"><div class="kpi-label">Total</div><div class="kpi-value" style="color:var(--red)">${d.total != null ? d.total : '—'}</div></div>`;
      html += '</div>';
      wrap.innerHTML = html;
    } catch (e) {
      if (wrap) wrap.innerHTML = `<div style="color:var(--muted)">Kunne ikke hente data: ${e.message}</div>`;
    }
  }

  async function loadHistory() {
    const wrap = document.getElementById('lemonade-history-wrap');
    if (!wrap) return;
    try {
      const r = await fetch('/api/lemonade/history');
      const history = await r.json();

      if (!history.length) {
        wrap.innerHTML = '<div style="color:var(--muted)">Ingen historik endnu.</div>';
        return;
      }

      const storeIds = STORES.map(s => s.id);
      const storeNames = STORES.map(s => s.name);

      let tableHtml = `<div style="overflow-x:auto;margin-bottom:24px"><table class="inv-table" style="width:100%">
        <thead><tr>
          <th>Dato</th>
          ${storeNames.map(n => `<th style="text-align:right">${n}</th>`).join('')}
          <th style="text-align:right">Total</th>
        </tr></thead>
        <tbody>`;

      const labels = [];
      const totals = [];
      const storeSeries = {};
      for (const sid of storeIds) storeSeries[sid] = [];

      for (const row of history) {
        labels.push(row.date);
        totals.push(row.total || 0);
        for (const sid of storeIds) storeSeries[sid].push(row.stores ? (row.stores[sid] || 0) : 0);
        tableHtml += `<tr>
          <td>${row.date}</td>
          ${storeIds.map(sid => `<td style="text-align:right">${row.stores ? (row.stores[sid] ?? '—') : '—'}</td>`).join('')}
          <td style="text-align:right;font-weight:600">${row.total != null ? row.total : '—'}</td>
        </tr>`;
      }
      tableHtml += '</tbody></table></div>';

      const colors = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c'];
      const datasets = storeIds.map((sid, i) => ({
        label: storeNames[i],
        data: storeSeries[sid],
        borderColor: colors[i % colors.length],
        backgroundColor: 'transparent',
        borderWidth: 2,
        tension: 0.3,
        pointRadius: 3,
      }));
      datasets.push({
        label: 'Total',
        data: totals,
        borderColor: 'var(--red)',
        backgroundColor: 'transparent',
        borderWidth: 3,
        tension: 0.3,
        pointRadius: 4,
        borderDash: [5,3],
      });

      wrap.innerHTML = tableHtml + `<div class="chart-wrap" style="height:280px"><canvas id="lemonade-chart"></canvas></div>`;

      makeChart('lemonade-chart', {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#f0f0f0', font: { size: 11 } } } },
          scales: {
            x: { ticks: { color: '#787878', font: { size: 10 } }, grid: { color: '#2c2c2c' } },
            y: { ticks: { color: '#787878', font: { size: 10 } }, grid: { color: '#2c2c2c' }, beginAtZero: true }
          }
        }
      });
    } catch (e) {
      if (wrap) wrap.innerHTML = `<div style="color:var(--muted)">Kunne ikke hente historik: ${e.message}</div>`;
    }
  }

  await Promise.all([loadToday(), loadHistory()]);

  if (lemonadeRefreshInterval) clearInterval(lemonadeRefreshInterval);
  lemonadeRefreshInterval = setInterval(() => {
    if (state.view === 'lemonade') {
      loadToday();
    } else {
      clearInterval(lemonadeRefreshInterval);
      lemonadeRefreshInterval = null;
    }
  }, 5 * 60 * 1000);
}

function renderMain() {
  if (lemonadeRefreshInterval && state.view !== 'lemonade') {
    clearInterval(lemonadeRefreshInterval);
    lemonadeRefreshInterval = null;
  }
  updateNav();
  if (state.view === 'chain') {
    renderChainView();
  } else if (state.view.startsWith('store:')) {
    renderStoreView(state.view.slice(6));
  } else if (state.view === 'invoices') {
    renderInvoicesView();
  } else if (state.view === 'meat') {
    renderMeatView();
  } else if (state.view === 'graphs') {
    renderGraphsView();
  } else if (state.view === 'katering') {
    renderKateringView();
  } else if (state.view === 'lemonade') {
    renderLemonadeView();
  }
}

// ── Auth ────────────────────────────────────────────────────────────────────────
function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  const errEl = document.getElementById('login-error');

  if (u === CREDS.username && p === CREDS.password) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    errEl.textContent = '';
    sessionStorage.setItem('kk_auth', '1');
    boot();
  } else {
    errEl.textContent = 'Invalid username or password';
    document.getElementById('password').value = '';
  }
}

function doLogout() {
  sessionStorage.removeItem('kk_auth');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  state.cache = {};
}

// Allow Enter key on login form
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('login-screen').classList.contains('hidden')) {
    doLogin();
  }
});

// ── Boot ────────────────────────────────────────────────────────────────────────
function boot() {
  loadInvoices();
  loadMeat();

  // Set active period button
  document.querySelectorAll('.pb').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.period === state.period);
  });

  renderSidebarSkeleton();
  loadSidebar();
  renderMain();
}

// Auto-login if session active
(function init() {
  if (sessionStorage.getItem('kk_auth') === '1') {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    boot();
  }
})();
</script>
</body>
</html>
